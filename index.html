<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ancient Europe — prototype skeleton</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/3.6.2/maplibre-gl.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/3.6.2/maplibre-gl.js"></script>
<script src="https://unpkg.com/pmtiles@3.0.7/dist/pmtiles.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-frame">
  <div class="topbar">
    <div class="topbar-logo">🌍 Ancient Europe <span class="dev-tag">prototype skeleton</span></div>
    <div class="topbar-right">
      <div class="overlay-toggles" id="overlay-toggles"></div>
    </div>
  </div>

  <div class="main-area">
    <div class="map-area">
      <div id="map"></div>
      <div class="map-placeholder-note">Real QGIS/PMTiles basemap not wired up yet — this pane proves layer toggles and period switching against placeholder tiles.</div>
    </div>

    <div class="info-panel">
      <div class="panel-header">
        <div class="period-title" id="period-title">—</div>
        <div class="period-subtitle" id="period-subtitle">—</div>
      </div>
      <div class="panel-tabs" id="panel-tabs"></div>
      <div class="panel-content" id="panel-content"></div>
    </div>
  </div>

  <div class="timeline-bar">
    <div class="timeline-label">Select a time period</div>
    <div class="timeline-periods" id="timeline-periods"></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
